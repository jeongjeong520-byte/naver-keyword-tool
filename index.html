<html lang="zh">
<head>
<meta charset="UTF-8">

<title>NAVER 关键词工具</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,"Malgun Gothic","Microsoft YaHei",sans-serif; }
body { background:#f4f6f9; color:#222; padding:20px; }
.container { max-width:1100px; margin:0 auto; }
h1 { text-align:center; color:#03c75a; margin:20px 0; font-size:28px; }
.subtitle { text-align:center; color:#888; margin-bottom:30px; font-size:14px; }
.search-box { display:flex; gap:10px; margin-bottom:40px; }
.search-box input { flex:1; padding:14px 18px; border:2px solid #ddd; border-radius:10px; font-size:16px; outline:none; }
.search-box input:focus { border-color:#03c75a; }
.search-box button { padding:14px 30px; background:#03c75a; color:#fff; border:none; border-radius:10px; font-size:16px; cursor:pointer; font-weight:bold; }
.search-box button:hover { background:#02a94c; }
.section-title { font-size:18px; font-weight:bold; margin:20px 0 15px; color:#333; }
.industry-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:30px; }
.industry-btn { padding:22px; background:#fff; border:2px solid #eee; border-radius:12px; cursor:pointer; text-align:center; font-size:16px; font-weight:bold; transition:.2s; }
.industry-btn:hover { border-color:#03c75a; transform:translateY(-2px); box-shadow:0 4px 12px rgba(3,199,90,.15); }
.filter-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-tab { padding:8px 18px; background:#fff; border:2px solid #ddd; border-radius:20px; cursor:pointer; font-size:14px; }
.filter-tab.active { background:#03c75a; color:#fff; border-color:#03c75a; }
.result-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.result-title { font-size:18px; font-weight:bold; }
.back-btn { padding:8px 16px; background:#eee; border:none; border-radius:8px; cursor:pointer; font-size:14px; }
.back-btn:hover { background:#ddd; }
table { width:100%; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.05); border-collapse:collapse; }
th { background:#03c75a; color:#fff; padding:14px; text-align:left; font-size:14px; }
td { padding:12px 14px; border-bottom:1px solid #f0f0f0; font-size:14px; }
tr:hover td { background:#f9fef9; }
.kw-main { font-weight:bold; color:#03c75a; }
.badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:bold; }
.badge-brand { background:#fff0f0; color:#e74c3c; }
.badge-big { background:#eef5ff; color:#3498db; }
.badge-long { background:#f0fff4; color:#27ae60; }
  /* 竞争程度标签 */
.comp { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:bold; }
.comp-high { background:#ffebee; color:#e53935; }   /* 높음 高 */
.comp-mid  { background:#fff8e1; color:#f9a825; }   /* 중간 中 */
.comp-low  { background:#e8f5e9; color:#43a047; }   /* 낮음 低 */
.trans { color:#666; font-size:13px; margin-left:4px; }
.num { text-align:right; font-variant-numeric:tabular-nums; }
.num-total { font-weight:bold; color:#03c75a; }
.loading { text-align:center; padding:40px; color:#888; }
.hidden { display:none; }

/* ===== 趋势图卡片 ===== */
.trend-card { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); padding:24px; margin-bottom:24px; }
.trend-head { font-size:18px; font-weight:bold; margin-bottom:4px; }
.trend-sub { color:#888; font-size:13px; margin-bottom:18px; }
.trend-bars { display:flex; align-items:flex-end; gap:6px; height:180px; padding:0 4px; }
.trend-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
.trend-bar { width:100%; background:linear-gradient(180deg,#4c8bf5,#03c75a); border-radius:6px 6px 0 0; transition:.3s; min-height:4px; }
.trend-bar-wrap:hover .trend-bar { opacity:.8; }
.trend-label { font-size:11px; color:#999; margin-top:6px; text-align:center; white-space:nowrap; }
.trend-val { font-size:11px; color:#555; margin-bottom:4px; }

/* ===== 分页 ===== */
.pagination { display:flex; justify-content:flex-end; align-items:center; gap:12px; margin-top:16px; padding:8px 4px; color:#666; font-size:14px; }
.page-btn { padding:6px 14px; background:#fff; border:1px solid #ddd; border-radius:8px; cursor:pointer; font-size:14px; }
.page-btn:hover:not(:disabled) { border-color:#03c75a; color:#03c75a; }
.page-btn:disabled { opacity:.4; cursor:not-allowed; }
.page-size { padding:6px 10px; border:1px solid #ddd; border-radius:8px; cursor:pointer; }
</style>

  </div>

  <div id="resultPage" class="hidden">
       <div class="result-header">
      <div class="result-title" id="resultTitle"></div>
      <div style="display:flex; gap:10px;">
        <button class="back-btn" onclick="exportExcel()" style="background:#03c75a; color:#fff;">📥 导出 Excel</button>

    </div>

      <div class="trend-bars" id="trendBars"></div>
    </div>

    <div class="filter-tabs" id="filterTabs">

    </div>
    <div id="resultBody"></div>
    <div id="pagination"></div>
  </div>
</div>

  '게임다운로드':'游戏下载','신작게임':'新游戏','롤':'英雄联盟','배그':'绝地求生','던파':'DNF',
  '쇼핑':'购物','최저가':'最低价','직구':'海淘','할인':'折扣','쿠팡':'Coupang','온라인쇼핑':'网购',
  '특가':'特价','무료배송':'免费配送','명품':'奢侈品','중고거래':'二手交易',
  '앱':'App','프로그램':'程序','편집':'编辑','변환기':'转换器','pdf변환':'PDF转换','다운로드':'下载',
  '유틸리티':'工具软件','캡처':'截图','녹화프로그램':'录屏软件','번역기':'翻译器',
  '드라마':'电视剧','숏폼':'短视频','웹드라마':'网剧','릴스':'Reels','넷플릭스':'Netflix',
  '드라마추천':'电视剧推荐','다시보기':'回放','미드':'美剧','일드':'日剧','웹툰':'网络漫画',
  '보험':'保险','대출':'贷款','부동산':'房地产','병원':'医院','학원':'补习班','자동차':'汽车','맛집':'美食店','뉴스':'新闻',
  '야놀자':'Yanolja','여기어때':'Yeogi Eottae','아고다':'Agoda','부킹닷컴':'Booking.com',
  '넷마블':'Netmarble','넥슨':'Nexon','11번가':'11st','지마켓':'Gmarket',
  '무신사':'Musinsa','올리브영':'Olive Young','포토샵':'Photoshop','파파고':'Papago','티빙':'Tving'
};
const INDUSTRY_NAMES = {
  travel:'🏨 旅游&酒店', game:'🎮 游戏', ecommerce:'🛒 电商',
  tool:'🔧 工具', drama:'🎬 短剧', other:'📦 其他'
};

let currentData = [];
let currentFilter = 'all';
let currentPage = 1;
let pageSize = 20;
let currentKeyword = '';

// 翻页时自动翻译用的缓存
const clientTransCache = {};

function trans(kw){
  if(TRANSLATE[kw]) return ` (${TRANSLATE[kw]})`;
  if(clientTransCache[kw]) return ` (${clientTransCache[kw]})`;
  const found = currentData.find(r => r.keyword === kw && r.translation);
  if(found) return ` (${found.translation})`;
  return '';
}

// 修饰词库（出现这些 = 长尾词）
const MODIFIER_WORDS = [
  '무료','할인','최저가','특가','저렴','가격','쿠폰','이벤트','프로모션','혜택',
  '추천','순위','인기','랭킹','비교','best','베스트','top',
  '다운로드','설치','예약','신청','가입','후기','리뷰','방법','사용법','하는법',
  'pc','모바일','앱','온라인','사이트','홈페이지','무료로',
  '제주도','서울','부산','강남','국내','해외','근처',
  '2024','2025','신작','최신','실시간','오늘'
];

function isBrand(kw){
  if(!kw) return false;
  const clean = kw.replace(/\s/g,'');

  // 1. 完全等于品牌词 → 一定是品牌词
  if(BRAND_WORDS.includes(kw)) return true;

  // 2. 包含匹配：但命中的品牌词太短(≤2)时，要求 kw 本身也很短，避免误伤
  const hit = BRAND_WORDS.find(b => kw.includes(b));
  if(hit){
    const hitLen = hit.replace(/\s/g,'').length;
    // 命中词≤2字 且 kw>3字 → 大概率是误伤（如 ps 匹配 팁스），不算品牌
    if(hitLen <= 2 && clean.length > 3) return false;
    // 占比达标才算
    if(hitLen / clean.length >= 0.6) return true;
  }
  return false;
}

function getType(kw, volume){
  // 1. 品牌词
  if(isBrand(kw)) return 'brand';

  // 2. 含修饰词 → 长尾
  if(MODIFIER_WORDS.some(m => kw.includes(m))) return 'long';

  // 3. 多词组合 → 长尾
  const wordCount = kw.trim().split(/\s+/).length;
  if(wordCount >= 2) return 'long';

  // 4. 单个短词 → 大类
  const len = kw.replace(/\s/g,'').length;
  if(len <= 4) return 'big';

  // 5. 其余 → 长尾
  return 'long';
}

function detectIndustry(kw){
  for(const [ind, words] of Object.entries(INDUSTRY_KEYWORDS)){
    for(const w of words){
      if(kw.includes(w) || w.includes(kw)) return ind;
    }
  }
  return 'other';
}

const typeBadge = {
  brand:'<span class="badge badge-brand">品牌词</span>',
  big:'<span class="badge badge-big">大类词</span>',
  long:'<span class="badge badge-long">长尾词</span>'
};
// 竞争度：韩文 → 中文 + 颜色
function compBadge(c){
  if(c==='높음' || c==='高') return '<span class="comp comp-high">🔴 高</span>';
  if(c==='중간' || c==='中') return '<span class="comp comp-mid">🟡 中</span>';
  if(c==='낮음' || c==='低') return '<span class="comp comp-low">🟢 低</span>';
  return '<span style="color:#bbb">-</span>';
}
function showIndustry(ind){
  const seeds = INDUSTRY_KEYWORDS[ind];
  currentData = seeds.map(kw => {
    const pc = Math.floor(Math.random()*20000)+1000;
    const mobile = Math.floor(Math.random()*30000)+2000;
        const comps = ['높음','중간','낮음'];
    return {
      keyword: kw, pcSearch:pc, mobileSearch:mobile, volume:pc+mobile,
      pcCtr: (Math.random()*2).toFixed(2),
      mobileCtr: (Math.random()*2).toFixed(2),
      competition: comps[Math.floor(Math.random()*3)],
      pcClick: Math.floor(pc*0.01),
      mobileClick: Math.floor(mobile*0.01),
      type:getType(kw, pc+mobile), isMain:false, translation:''
    };
  });
  currentData.sort((a,b)=> b.volume-a.volume);
  currentFilter = 'all';
  currentPage = 1;
  resetTabs();
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  document.getElementById('resultTitle').textContent = INDUSTRY_NAMES[ind] + ' · 热门投放关键词';
  renderTrend();
  renderTable();
}

async function doSearch(){
  const kw = document.getElementById('searchInput').value.trim();
  if(!kw){ alert('请输入关键词'); return; }
  currentKeyword = kw;

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  document.getElementById('trendCard').classList.add('hidden');
  const ind = detectIndustry(kw);
  document.getElementById('resultTitle').textContent =
    `搜索：${kw}${trans(kw)} · 识别行业【${INDUSTRY_NAMES[ind]}】`;
  document.getElementById('resultBody').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  document.getElementById('pagination').innerHTML = '';
  currentFilter = 'all';
  currentPage = 1;
  resetTabs();

  try{
    const res = await fetch(`/api/keyword?keyword=${encodeURIComponent(kw)}`);
    const data = await res.json();

    let list = data.list || [];
    if(!Array.isArray(list)) list = [];

       currentData = list.map(item=>{
      const k = item.keyword || '';
      const pc = Number(item.pcSearch) || 0;
      const mobile = Number(item.mobileSearch) || 0;
      const vol = pc + mobile;
      return {
        keyword:k, pcSearch:pc, mobileSearch:mobile, volume:vol,
        pcCtr: item.pcCtr ?? '-',
        mobileCtr: item.mobileCtr ?? '-',
        competition: item.competition || '-',                    // 👈 竞争度
        pcClick: Number(item.pcClick) || 0,                      // 👈 PC点击
        mobileClick: Number(item.mobileClick) || 0,              // 👈 移动点击
        type:getType(k,vol), isMain:(k===kw),
        translation: item.translation || ''
      };
    });

    currentData.sort((a,b)=> (b.isMain?1:0)-(a.isMain?1:0) || b.volume-a.volume);

    document.getElementById('resultTitle').textContent =
      `搜索：${kw}${trans(kw)} · 识别行业【${INDUSTRY_NAMES[ind]}】 · 共${currentData.length}个词`;

    renderTrend();
    renderTable();
  }catch(e){
    document.getElementById('resultBody').innerHTML =
      '<div class="loading">❌ 加载失败，请检查 API：'+e.message+'</div>';
  }
}

// ★ 趋势柱状图：取搜索量 Top 12
function renderTrend(){
  const card = document.getElementById('trendCard');
  const top = [...currentData].sort((a,b)=>b.volume-a.volume).slice(0,12);
  if(top.length === 0){ card.classList.add('hidden'); return; }
  card.classList.remove('hidden');
  const max = Math.max(...top.map(r=>r.volume)) || 1;

  document.getElementById('trendHead').textContent =
    `📈 ${currentKeyword||'热门'} 相关热词搜索量 Top ${top.length}`;

  let html = '';
  top.forEach(r=>{
    const h = Math.round(r.volume / max * 100);
    const label = r.keyword.length > 6 ? r.keyword.slice(0,6)+'…' : r.keyword;
    html += `<div class="trend-bar-wrap" title="${r.keyword}${trans(r.keyword)} : ${r.volume.toLocaleString()}">
        <div class="trend-val">${(r.volume/1000).toFixed(0)}k</div>
        <div class="trend-bar" style="height:${h}%"></div>
        <div class="trend-label">${label}</div>
      </div>`;
  });
  document.getElementById('trendBars').innerHTML = html;
}

function filterType(t){
  currentFilter = t;
  currentPage = 1;
  document.querySelectorAll('.filter-tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.type===t);
  });
  renderTable();
}
function resetTabs(){
  document.querySelectorAll('.filter-tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.type==='all');
  });
}

function getFilteredRows(){
  let rows = currentData;
  if(currentFilter!=='all') rows = rows.filter(r=>r.type===currentFilter);
  return rows;
}

function renderTable(){
  const rows = getFilteredRows();

  if(rows.length===0){
    document.getElementById('resultBody').innerHTML='<div class="loading">暂无数据</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }

  const totalPages = Math.ceil(rows.length / pageSize);
  if(currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage-1)*pageSize;
  const pageRows = rows.slice(start, start+pageSize);

     let html = '<table><thead><tr>'
    + '<th style="width:40px">#</th>'
    + '<th>关键词</th><th>词性</th>'
    + '<th class="num">PC搜索量</th>'
    + '<th class="num">移动搜索量</th>'
    + '<th class="num">合计</th>'
    + '<th class="num">PC点击率</th>'
    + '<th class="num">移动点击率</th>'
    + '<th class="num">月均点击</th>'      // 👈 新增
    + '<th>竞争度</th>'                    // 👈 新增
    + '</tr></thead><tbody>';
  pageRows.forEach((r,i)=>{
    const totalClick = (r.pcClick||0) + (r.mobileClick||0);
    html += `<tr>
      <td>${start+i+1}</td>
      <td class="${r.isMain?'kw-main':''}">${r.isMain?'⭐ ':''}${r.keyword}<span class="trans">${trans(r.keyword)}</span></td>
      <td>${typeBadge[r.type]}</td>
      <td class="num">${r.pcSearch.toLocaleString()}</td>
      <td class="num">${r.mobileSearch.toLocaleString()}</td>
      <td class="num num-total">${r.volume.toLocaleString()}</td>
      <td class="num">${r.pcCtr}${r.pcCtr==='-'?'':'%'}</td>
      <td class="num">${r.mobileCtr}${r.mobileCtr==='-'?'':'%'}</td>
      <td class="num">${totalClick.toLocaleString()}</td>
      <td>${compBadge(r.competition)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('resultBody').innerHTML = html;

  renderPagination(rows.length, totalPages);

  // ★ 翻页时自动翻译本页还没有译文的词
  autoTranslatePage(pageRows);
}

function renderPagination(total, totalPages){
  const html = `
    <div class="pagination">
      每页
      <select class="page-size" onchange="changePageSize(this.value)">
        <option value="10" ${pageSize==10?'selected':''}>10</option>
        <option value="20" ${pageSize==20?'selected':''}>20</option>
        <option value="50" ${pageSize==50?'selected':''}>50</option>
      </select> 条
      <span>第 ${(currentPage-1)*pageSize+1} - ${Math.min(currentPage*pageSize,total)} 条 / 共 ${total} 条</span>
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹ 上一页</button>
      <span>${currentPage} / ${totalPages}</span>
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>下一页 ›</button>
    </div>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p){
  const rows = getFilteredRows();
  const totalPages = Math.ceil(rows.length/pageSize);
  if(p<1||p>totalPages) return;
  currentPage = p;
  renderTable();
  window.scrollTo({top:0,behavior:'smooth'});
}
function changePageSize(v){
  pageSize = Number(v);
  currentPage = 1;
  renderTable();
}
// ★ 自动翻译本页缺失译文的词
async function autoTranslatePage(pageRows){
  const need = pageRows
    .map(r=>r.keyword)
    .filter(k => k && !TRANSLATE[k] && !clientTransCache[k]
      && !currentData.find(r=>r.keyword===k && r.translation));
  if(need.length===0) return;

  try{
    const res = await fetch(`/api/translate?words=${encodeURIComponent(need.join('|'))}`);
    if(!res.ok) return; // 后端没有该接口就跳过，不报错
    const data = await res.json();
    // 期望后端返回格式： { "게임":"游戏", "무료게임":"免费游戏", ... }
    if(data && typeof data === 'object'){
      let changed = false;
      for(const k in data){
        if(data[k]){ clientTransCache[k] = data[k]; changed = true; }
      }
      if(changed) renderTable(); // 拿到译文后重绘当前页
    }
  }catch(e){
    // 静默失败，不影响页面
    console.log('翻译接口暂不可用，跳过', e.message);
  }
}
// ★ 导出 Excel（CSV）
function exportExcel(){
  // 导出当前筛选后的全部数据（不只是当前页）
  const rows = getFilteredRows();
  if(rows.length === 0){ alert('没有数据可以导出'); return; }

  const typeName = { brand:'品牌词', big:'大类词', long:'长尾词' };
  const compName = { '높음':'高','중간':'中','낮음':'低' };
  const header = ['#','关键词','翻译','词性','PC搜索量','移动搜索量','合计','PC点击率','移动点击率','月均点击','竞争度'];

  const lines = rows.map((r,i)=>{
    let tr = trans(r.keyword).trim().replace(/^\(|\)$/g,'');
    const pcCtr = (r.pcCtr==='-'||r.pcCtr==null) ? '-' : r.pcCtr+'%';
    const mbCtr = (r.mobileCtr==='-'||r.mobileCtr==null) ? '-' : r.mobileCtr+'%';
    const totalClick = (r.pcClick||0) + (r.mobileClick||0);
    const comp = compName[r.competition] || r.competition || '-';
    return [
      i+1, r.keyword, tr, typeName[r.type]||r.type,
      r.pcSearch, r.mobileSearch, r.volume,
      pcCtr, mbCtr, totalClick, comp
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });

  // \uFEFF 是 BOM 头，防止 Excel 打开中文/韩文乱码
  const csv = '\uFEFF' + header.join(',') + '\n' + lines.join('\n');

  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const fname = (currentKeyword || '关键词分析') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function goHome(){
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('homePage').classList.remove('hidden');
  document.getElementById('searchInput').value='';
  document.getElementById('trendCard').classList.add('hidden');
}

document.getElementById('searchInput').addEventListener('keypress',e=>{
  if(e.key==='Enter') doSearch();
});
</script>
