<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naver 关键词工具</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,"Malgun Gothic","Microsoft YaHei",sans-serif; }
body { background:#f4f6f9; color:#222; padding:20px; }
.container { max-width:1100px; margin:0 auto; }
h1 { text-align:center; color:#03c75a; margin:20px 0; font-size:28px; }
.subtitle { text-align:center; color:#888; margin-bottom:30px; font-size:14px; }
.search-box { display:flex; gap:10px; margin-bottom:40px; }
.search-box input { flex:1; padding:14px 18px; border:2px solid #ddd; border-radius:10px; font-size:16px; outline:none; }
.search-box input:focus { border-color:#03c75a; }
.search-box button { padding:14px 30px; background:#03c75a; color:#fff; border:none; border-radius:10px; font-size:16px; cursor:pointer; font-weight:bold; }
.search-box button:hover { background:#02a94c; }
.section-title { font-size:18px; font-weight:bold; margin:20px 0 15px; color:#333; }
.industry-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:30px; }
.industry-btn { padding:22px; background:#fff; border:2px solid #eee; border-radius:12px; cursor:pointer; text-align:center; font-size:16px; font-weight:bold; transition:.2s; }
.industry-btn:hover { border-color:#03c75a; transform:translateY(-2px); box-shadow:0 4px 12px rgba(3,199,90,.15); }
.filter-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-tab { padding:8px 18px; background:#fff; border:2px solid #ddd; border-radius:20px; cursor:pointer; font-size:14px; }
.filter-tab.active { background:#03c75a; color:#fff; border-color:#03c75a; }
.result-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.result-title { font-size:18px; font-weight:bold; }
.back-btn { padding:8px 16px; background:#eee; border:none; border-radius:8px; cursor:pointer; font-size:14px; }
.back-btn:hover { background:#ddd; }
table { width:100%; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.05); border-collapse:collapse; }
th { background:#03c75a; color:#fff; padding:14px; text-align:left; font-size:14px; }
td { padding:12px 14px; border-bottom:1px solid #f0f0f0; font-size:14px; }
tr:hover td { background:#f9fef9; }
.kw-main { font-weight:bold; color:#03c75a; }
.badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:bold; }
.badge-brand { background:#fff0f0; color:#e74c3c; }
.badge-big { background:#eef5ff; color:#3498db; }
.badge-long { background:#f0fff4; color:#27ae60; }
.trans { color:#888; font-size:13px; }
.num { text-align:right; font-variant-numeric:tabular-nums; }
.num-total { font-weight:bold; color:#03c75a; }
.loading { text-align:center; padding:40px; color:#888; }
.hidden { display:none; }
</style>
</head>
<body>
<div class="container">
  <h1>🔍 Naver 关键词工具</h1>
  <p class="subtitle">搜索关键词 · 查看行业投放热词 · 按词性分类</p>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="输入关键词，如：게임쿠폰 / 호텔예약 ...">
    <button onclick="doSearch()">搜索</button>
  </div>

  <div id="homePage">
    <div class="section-title">📊 热门行业投放关键词</div>
    <div class="industry-grid">
      <div class="industry-btn" onclick="showIndustry('travel')">🏨 旅游&酒店</div>
      <div class="industry-btn" onclick="showIndustry('game')">🎮 游戏</div>
      <div class="industry-btn" onclick="showIndustry('ecommerce')">🛒 电商</div>
      <div class="industry-btn" onclick="showIndustry('tool')">🔧 工具</div>
      <div class="industry-btn" onclick="showIndustry('drama')">🎬 短剧</div>
      <div class="industry-btn" onclick="showIndustry('other')">📦 其他</div>
    </div>
  </div>

  <div id="resultPage" class="hidden">
    <div class="result-header">
      <div class="result-title" id="resultTitle"></div>
      <button class="back-btn" onclick="goHome()">← 返回首页</button>
    </div>
    <div class="filter-tabs" id="filterTabs">
      <div class="filter-tab active" data-type="all" onclick="filterType('all')">全部</div>
      <div class="filter-tab" data-type="brand" onclick="filterType('brand')">品牌词</div>
      <div class="filter-tab" data-type="big" onclick="filterType('big')">大类词</div>
      <div class="filter-tab" data-type="long" onclick="filterType('long')">长尾词</div>
    </div>
    <div id="resultBody"></div>
  </div>
</div>

<script>
const INDUSTRY_KEYWORDS = {
  travel: ['호텔','호텔예약','여행','항공권','펜션','리조트','제주도여행','국내여행','해외여행','숙소','게스트하우스'],
  game:   ['게임','모바일게임','게임쿠폰','pc게임','rpg게임','게임다운로드','신작게임','롤','배그','던파'],
  ecommerce:['쇼핑','최저가','직구','할인','쿠팡','온라인쇼핑','특가','무료배송','명품','중고거래'],
  tool:   ['앱','프로그램','편집','변환기','pdf변환','다운로드','유틸리티','캡처','녹화프로그램','번역기'],
  drama:  ['드라마','숏폼','웹드라마','릴스','넷플릭스','드라마추천','다시보기','미드','일드','웹툰'],
  other:  ['보험','대출','부동산','병원','학원','자동차','맛집','뉴스']
};
const BRAND_WORDS = [
  '하나투어','노랑풍선','야놀자','여기어때','아고다','부킹닷컴','트리바고','인터파크투어','모두투어','에어비앤비','호텔스컴바인',
  '넷마블','엔씨소프트','넥슨','크래프톤','펄어비스','스마일게이트','컴투스','카카오게임즈',
  '쿠팡','네이버쇼핑','11번가','지마켓','옥션','위메프','티몬','무신사','에이블리','올리브영',
  '어도비','포토샵','알집','반디캠','오캠','곰플레이어','파파고','네이버웨일',
  '넷플릭스','티빙','웨이브','왓챠','디즈니플러스','쿠팡플레이'
];
const TRANSLATE = {
  '호텔':'酒店','호텔예약':'酒店预订','여행':'旅游','항공권':'机票','펜션':'民宿','리조트':'度假村',
  '제주도여행':'济州岛旅游','국내여행':'国内旅游','해외여행':'海外旅游','숙소':'住宿','게스트하우스':'青年旅舍',
  '게임':'游戏','모바일게임':'手游','게임쿠폰':'游戏优惠券','pc게임':'PC游戏','rpg게임':'RPG游戏',
  '게임다운로드':'游戏下载','신작게임':'新游戏','롤':'英雄联盟','배그':'绝地求生','던파':'DNF',
  '쇼핑':'购物','최저가':'最低价','직구':'海淘','할인':'折扣','쿠팡':'Coupang','온라인쇼핑':'网购',
  '특가':'特价','무료배송':'免费配送','명품':'奢侈品','중고거래':'二手交易',
  '앱':'App','프로그램':'程序','편집':'编辑','변환기':'转换器','pdf변환':'PDF转换','다운로드':'下载',
  '유틸리티':'工具软件','캡처':'截图','녹화프로그램':'录屏软件','번역기':'翻译器',
  '드라마':'电视剧','숏폼':'短视频','웹드라마':'网剧','릴스':'Reels','넷플릭스':'Netflix',
  '드라마추천':'电视剧推荐','다시보기':'回放','미드':'美剧','일드':'日剧','웹툰':'网络漫画',
  '보험':'保险','대출':'贷款','부동산':'房地产','병원':'医院','학원':'补习班','자동차':'汽车','맛집':'美食店','뉴스':'新闻',
  '야놀자':'Yanolja','여기어때':'Yeogi Eottae','아고다':'Agoda','부킹닷컴':'Booking.com',
  '넷마블':'Netmarble','넥슨':'Nexon','11번가':'11st','지마켓':'Gmarket',
  '무신사':'Musinsa','올리브영':'Olive Young','포토샵':'Photoshop','파파고':'Papago','티빙':'Tving'
};
const INDUSTRY_NAMES = {
  travel:'🏨 旅游&酒店', game:'🎮 游戏', ecommerce:'🛒 电商',
  tool:'🔧 工具', drama:'🎬 短剧', other:'📦 其他'
};

let currentData = [];
let currentFilter = 'all';

function trans(kw){ return TRANSLATE[kw] ? ` (${TRANSLATE[kw]})` : ''; }

function getType(kw, volume){
  if(BRAND_WORDS.includes(kw)) return 'brand';
  const len = kw.replace(/\s/g,'').length;
  if(len <= 5 && volume >= 5000) return 'big';
  if(len <= 4) return 'big';
  return 'long';
}

function detectIndustry(kw){
  for(const [ind, words] of Object.entries(INDUSTRY_KEYWORDS)){
    for(const w of words){
      if(kw.includes(w) || w.includes(kw)) return ind;
    }
  }
  return 'other';
}

const typeBadge = {
  brand:'<span class="badge badge-brand">品牌词</span>',
  big:'<span class="badge badge-big">大类词</span>',
  long:'<span class="badge badge-long">长尾词</span>'
};

function showIndustry(ind){
  const seeds = INDUSTRY_KEYWORDS[ind];
  currentData = seeds.map(kw => {
    const pc = Math.floor(Math.random()*20000)+1000;
    const mobile = Math.floor(Math.random()*30000)+2000;
    return { keyword: kw, pcSearch:pc, mobileSearch:mobile, volume:pc+mobile, type:getType(kw, pc+mobile), isMain:false };
  });
  currentFilter = 'all';
  resetTabs();
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  document.getElementById('resultTitle').textContent = INDUSTRY_NAMES[ind] + ' · 热门投放关键词';
  renderTable();
}

async function doSearch(){
  const kw = document.getElementById('searchInput').value.trim();
  if(!kw){ alert('请输入关键词'); return; }

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  const ind = detectIndustry(kw);
  document.getElementById('resultTitle').textContent =
    `搜索：${kw}${trans(kw)} · 识别行业【${INDUSTRY_NAMES[ind]}】`;
  document.getElementById('resultBody').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  currentFilter = 'all';
  resetTabs();

  try{
    const res = await fetch(`/api/keyword?keyword=${encodeURIComponent(kw)}`);
    const data = await res.json();

    let list = data.list || [];
    if(!Array.isArray(list)) list = [];

    // ★ 修正字段名：直接用后端返回的 pcSearch / mobileSearch
    currentData = list.map(item=>{
      const k = item.keyword || '';
      const pc = Number(item.pcSearch) || 0;
      const mobile = Number(item.mobileSearch) || 0;
      const vol = pc + mobile;
      return { keyword:k, pcSearch:pc, mobileSearch:mobile, volume:vol, type:getType(k,vol), isMain:(k===kw) };
    });

    currentData.sort((a,b)=> (b.isMain?1:0)-(a.isMain?1:0) || b.volume-a.volume);
    renderTable();
  }catch(e){
    document.getElementById('resultBody').innerHTML =
      '<div class="loading">❌ 加载失败，请检查 API：'+e.message+'</div>';
  }
}

function filterType(t){
  currentFilter = t;
  document.querySelectorAll('.filter-tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.type===t);
  });
  renderTable();
}
function resetTabs(){
  document.querySelectorAll('.filter-tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.type==='all');
  });
}

function renderTable(){
  let rows = currentData;
  if(currentFilter!=='all') rows = rows.filter(r=>r.type===currentFilter);

  if(rows.length===0){
    document.getElementById('resultBody').innerHTML='<div class="loading">暂无数据</div>';
    return;
  }

  // ★ 表头：PC / 移动 / 合计 三列
  let html = '<table><thead><tr>'
    + '<th>关键词</th><th>词性</th>'
    + '<th class="num">PC搜索量</th>'
    + '<th class="num">移动搜索量</th>'
    + '<th class="num">合计</th>'
    + '</tr></thead><tbody>';
  rows.forEach(r=>{
    html += `<tr>
      <td class="${r.isMain?'kw-main':''}">${r.isMain?'⭐ ':''}${r.keyword}<span class="trans">${trans(r.keyword)}</span></td>
      <td>${typeBadge[r.type]}</td>
      <td class="num">${r.pcSearch.toLocaleString()}</td>
      <td class="num">${r.mobileSearch.toLocaleString()}</td>
      <td class="num num-total">${r.volume.toLocaleString()}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('resultBody').innerHTML = html;
}

function goHome(){
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('homePage').classList.remove('hidden');
  document.getElementById('searchInput').value='';
}

document.getElementById('searchInput').addEventListener('keypress',e=>{
  if(e.key==='Enter') doSearch();
});
</script>
</body>
</html>
