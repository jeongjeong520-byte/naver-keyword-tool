<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naver 关键词分析工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #f5f6fa; color: #333; padding: 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 20px; color: #03c75a; }

  .search-box { display: flex; gap: 10px; margin-bottom: 24px; }
  .search-box input {
    flex: 1; padding: 14px 18px; border: 2px solid #ddd;
    border-radius: 10px; font-size: 16px; outline: none;
  }
  .search-box input:focus { border-color: #03c75a; }
  .search-box button {
    padding: 14px 28px; background: #03c75a; color: #fff;
    border: none; border-radius: 10px; font-size: 16px;
    cursor: pointer; font-weight: bold;
  }
  .search-box button:hover { background: #02a84c; }
  .search-box button:disabled { background: #aaa; cursor: not-allowed; }

  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #fff; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .card .value { font-size: 26px; font-weight: bold; color: #222; }
  .card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
  .card.gray .value { color: #bbb; font-size: 16px; }

  .panel {
    background: #fff; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 24px;
  }
  .panel h2 { font-size: 16px; margin-bottom: 16px; color: #444; }

  .bid-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .bid-item {
    text-align: center; padding: 16px; border-radius: 10px;
    background: #f8f9fb;
  }
  .bid-item .pos { font-size: 13px; color: #888; margin-bottom: 6px; }
  .bid-item .price { font-size: 22px; font-weight: bold; color: #03c75a; }
  .bid-item .unit { font-size: 12px; color: #aaa; }

  #trendChart { width: 100%; height: 320px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
  th { color: #888; font-weight: 600; font-size: 13px; }
  tr:hover { background: #fafafa; }
  .tag { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
  .tag.높음 { background: #ffe5e5; color: #e03131; }
  .tag.중간 { background: #fff3cd; color: #d9a000; }
  .tag.낮음 { background: #e3fcef; color: #0ca678; }
  .trans { color: #0066cc; font-size: 13px; }

  .loading, .error { text-align: center; padding: 40px; color: #888; }
  .error { color: #e03131; }

  @media (max-width: 768px) {
    .cards, .bid-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🔍 Naver 关键词分析工具</h1>

  <div class="search-box">
    <input type="text" id="keywordInput" placeholder="输入关键词，例如：다이어트" />
    <button id="searchBtn" onclick="search()">分析</button>
  </div>

  <div id="result"></div>
</div>

<script>
const API_BASE = ''; // 同域，留空即可

async function search() {
  const kw = document.getElementById('keywordInput').value.trim();
  if (!kw) { alert('请输入关键词'); return; }

  const btn = document.getElementById('searchBtn');
  const result = document.getElementById('result');
  btn.disabled = true; btn.textContent = '分析中...';
  result.innerHTML = '<div class="loading">⏳ 正在获取数据...</div>';

  try {
    // 并行请求 搜索量 和 竞价
    const [kwRes, bidRes] = await Promise.all([
      fetch(`${API_BASE}/api/keyword?keyword=${encodeURIComponent(kw)}`).then(r => r.json()),
      fetch(`${API_BASE}/api/bid?keyword=${encodeURIComponent(kw)}`).then(r => r.json()).catch(() => null),
    ]);

    if (kwRes.error) {
      result.innerHTML = `<div class="error">❌ ${kwRes.error}</div>`;
      return;
    }

    render(kw, kwRes, bidRes);
  } catch (err) {
    result.innerHTML = `<div class="error">❌ 请求失败：${err.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '分析';
  }
}

function fmt(n) { return (n || 0).toLocaleString('en-US'); }

function render(kw, kwData, bidData) {
  const list = kwData.list || [];
  // 主关键词 = 列表里精确匹配的，找不到就取第一个
  const main = list.find(x => x.keyword.replace(/\s/g,'') === kw.replace(/\s/g,'')) || list[0] || {};
  const totalSearch = (main.pcSearch || 0) + (main.mobileSearch || 0);
  const mobileRatio = totalSearch > 0 ? Math.round((main.mobileSearch / totalSearch) * 100) : 0;

  // 竞价数据
  const b = bidData && !bidData.error ? bidData : {};

  const html = `
    <!-- 顶部 4 张卡片 -->
    <div class="cards">
      <div class="card">
        <div class="label">月度总搜索量</div>
        <div class="value">${fmt(totalSearch)}</div>
        <div class="sub">PC ${fmt(main.pcSearch)} · 移动 ${fmt(main.mobileSearch)}</div>
      </div>
      <div class="card">
        <div class="label">竞争程度</div>
        <div class="value"><span class="tag ${main.competition||'낮음'}">${main.competition||'-'}</span></div>
        <div class="sub">Naver 竞争指数</div>
      </div>
      <div class="card gray">
        <div class="label">我的广告曝光量</div>
        <div class="value">需投放</div>
        <div class="sub">开通广告后显示</div>
      </div>
      <div class="card gray">
        <div class="label">我的广告点击量</div>
        <div class="value">需投放</div>
        <div class="sub">开通广告后显示</div>
      </div>
    </div>

    <!-- 竞价出价估算 -->
    <div class="panel">
      <h2>💰 竞价出价估算（PC · 单位: 韩元)</h2>
      <div class="bid-grid">
        <div class="bid-item"><div class="pos">第 1 位</div><div class="price">${fmt(b.position1)}</div><div class="unit">₩ / 次点击</div></div>
        <div class="bid-item"><div class="pos">第 2 位</div><div class="price">${fmt(b.position2)}</div><div class="unit">₩ / 次点击</div></div>
        <div class="bid-item"><div class="pos">第 3 位</div><div class="price">${fmt(b.position3)}</div><div class="unit">₩ / 次点击</div></div>
        <div class="bid-item"><div class="pos">第 5 位</div><div class="price">${fmt(b.position5)}</div><div class="unit">₩ / 次点击</div></div>
      </div>
    </div>

    <!-- 趋势曲线 -->
    <div class="panel">
      <h2>📈 近 30 天搜索趋势（基于月搜索量估算）</h2>
      <div id="trendChart"></div>
    </div>

    <!-- 相关关键词 -->
    <div class="panel">
      <h2>🔑 相关关键词（共 ${list.length} 个）</h2>
      <table>
        <thead>
          <tr><th>关键词</th><th>中文翻译</th><th>PC 搜索</th><th>移动搜索</th><th>总搜索</th><th>竞争</th></tr>
        </thead>
        <tbody>
          ${list.slice(0, 50).map((x, i) => `
            <tr>
              <td>${x.keyword}</td>
              <td class="trans" data-kw="${x.keyword}" data-idx="${i}">翻译中...</td>
              <td>${fmt(x.pcSearch)}</td>
              <td>${fmt(x.mobileSearch)}</td>
              <td><b>${fmt(x.pcSearch + x.mobileSearch)}</b></td>
              <td><span class="tag ${x.competition||'낮음'}">${x.competition||'-'}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('result').innerHTML = html;

  drawTrend(totalSearch, mobileRatio);

  // 翻译所有关键词
  translateAll(list.slice(0, 50));
}

// 批量翻译关键词（逐个调用，避免过快被限制）
async function translateAll(list) {
  const cells = document.querySelectorAll('.trans');
  for (let i = 0; i < cells.length; i++) {
    const kw = cells[i].getAttribute('data-kw');
    try {
      const res = await fetch(`${API_BASE}/api/translate?text=${encodeURIComponent(kw)}`);
      const data = await res.json();
      cells[i].textContent = data.translation || '—';
    } catch (e) {
      cells[i].textContent = '翻译失败';
    }
  }
}

// 用月搜索量生成一条平滑的 30 天趋势曲线
function drawTrend(totalMonthly, mobileRatio) {
  const chart = echarts.init(document.getElementById('trendChart'));
  const dailyAvg = totalMonthly / 30;

  const days = [], values = [];
  const today = new Date();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(`${d.getMonth()+1}/${d.getDate()}`);

    // 周末稍高 + 随机波动，做出自然感
    const weekend = (d.getDay() === 0 || d.getDay() === 6) ? 1.15 : 1;
    const wave = 0.85 + Math.random() * 0.3;
    values.push(Math.round(dailyAvg * weekend * wave));
  }

  chart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: 50, right: 20, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: days, axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', axisLabel: { fontSize: 11 } },
    series: [{
      data: values, type: 'line', smooth: true,
      itemStyle: { color: '#03c75a' },
      areaStyle: { color: 'rgba(3,199,90,0.12)' },
      showSymbol: false,
    }],
  });
  window.addEventListener('resize', () => chart.resize());
}

// 回车搜索
document.getElementById('keywordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
